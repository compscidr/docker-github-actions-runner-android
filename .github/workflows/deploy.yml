name: Deploy container
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build JDK ${{ matrix.java_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java_version: ["17", "21"]
        include:
          - java_version: "21"
            is_default_jdk: true
          - java_version: "17"
            is_default_jdk: false
    steps:
      - uses: actions/checkout@v6

      - name: Extract runner version from Dockerfile
        id: versions
        run: |
          RUNNER_TAG=$(grep '^ARG VERSION=' Dockerfile | cut -d= -f2)
          RUNNER_VERSION=$(echo "$RUNNER_TAG" | cut -d- -f1)
          echo "runner_tag=${RUNNER_TAG}" >> $GITHUB_OUTPUT
          echo "runner_version=${RUNNER_VERSION}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/github-runner-android
            ghcr.io/${{ github.repository_owner }}/github-runner-android
          tags: |
            type=raw,value=jdk${{ matrix.java_version }}
            type=raw,value=${{ steps.versions.outputs.runner_version }}-jdk${{ matrix.java_version }}
            type=raw,value=latest,enable=${{ matrix.is_default_jdk }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.versions.outputs.runner_tag }}
            JAVA_VERSION=${{ matrix.java_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
